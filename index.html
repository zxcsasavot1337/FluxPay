<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FluxPay</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Inter,Arial;
color:#fff;
background:radial-gradient(circle,#1a2a6c,#0b1020);
min-height:100vh;
}

.container{max-width:1200px;margin:0 auto;padding:20px}

.header{
text-align:center;
padding:40px;
background:rgba(255,255,255,0.05);
border-radius:20px;
}

h1{font-size:2.5rem}

.filters{display:flex;gap:10px;justify-content:center;margin:20px 0;flex-wrap:wrap}

.filter-btn{
padding:10px 15px;
border-radius:999px;
border:1px solid #fff3;
background:#ffffff10;
color:#fff;
cursor:pointer;
}

.filter-btn.active{background:#ffb347;color:#000;font-weight:bold}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:15px}

.card{
background:#111827cc;
padding:15px;
border-radius:16px;
border:1px solid #ffffff10;
}

.badge{color:#ffcc33;font-size:12px}
.title{font-size:18px;font-weight:700;margin:8px 0}

.row{display:flex;justify-content:space-between;font-size:13px;color:#cbd5e1}

ul{font-size:12px;color:#94a3b8;margin-top:8px}

.btn{
display:block;
margin-top:10px;
padding:10px;
text-align:center;
background:linear-gradient(90deg,#ffb347,#ff5f6d);
color:#000;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

.section{margin-top:40px}

.company-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:10px;
}

.company-item{
background:#00000040;
padding:12px;
border-radius:12px;
font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>💳 FluxPay</h1>
</div>

<div class="filters">
<button class="filter-btn active" onclick="setFilter('all',this)">Все</button>
<button class="filter-btn" onclick="setFilter('loan',this)">МФО</button>
<button class="filter-btn" onclick="setFilter('credit',this)">Кредитки</button>
<button class="filter-btn" onclick="setFilter('debit',this)">Дебетовые</button>
<button class="filter-btn" onclick="setFilter('rko',this)">РКО</button>
</div>

<div id="grid" class="grid"></div>

<div class="section">
<h2>📋 Компании</h2>
<div id="companies" class="company-grid"></div>
</div>

</div>

<script>

let filter="all";

function track(name){
let d=JSON.parse(localStorage.getItem("flux")||"{}");
d[name]=(d[name]||0)+1;
localStorage.setItem("flux",JSON.stringify(d));
}

const data=[

// ===== МФО (ВСЕ ВОССТАНОВЛЕНО) =====
{name:"Займер",type:"loan",label:"МФО",term:"до 30 дней",rate:"0.8%",url:"#"},
{name:"Быстроденьги",type:"loan",label:"МФО",term:"до 30 дней",rate:"0.8%",url:"#"},
{name:"Срочно Деньги",type:"loan",label:"МФО",term:"до 30 дней",rate:"0.8%",url:"#"},
{name:"А-Деньги",type:"loan",label:"МФО",term:"до 30 дней",rate:"0.8%",url:"#"},
{name:"БелкаКредит",type:"loan",label:"МФО",term:"до 30 дней",rate:"0.8%",url:"#"},
{name:"Webbankir",type:"loan",label:"МФО",term:"до 30 дней",rate:"0.8%",url:"#"},
{name:"Умные наличные",type:"loan",label:"МФО",term:"до 30 дней",rate:"0.8%",url:"#"},
{name:"Деньги Сразу",type:"loan",label:"МФО",term:"до 30 дней",rate:"0.8%",url:"#"},
{name:"Привет, сосед",type:"loan",label:"МФО",term:"до 30 дней",rate:"0.8%",url:"#"},

// ===== КРЕДИТКИ =====
{name:"Альфа-Банк",type:"credit",label:"Кредитка",term:"100 дней",rate:"0%"},
{name:"Т-Банк",type:"credit",label:"Кредитка",term:"55 дней",rate:"0%"},

// ===== ДЕБЕТ =====
{name:"Альфа Дебетовая",type:"debit",label:"Дебетовая",term:"—",rate:"до 20%"},

// ===== РКО =====
{name:"Альфа РКО + Бизнес",type:"rko",label:"РКО",term:"онлайн",rate:"—"},
{name:"ВТБ РКО + Бизнес",type:"rko",label:"РКО",term:"онлайн",rate:"—"}

];

const companies=[

// МФО
{name:"Займер",inn:"5406836941",ogrn:"1235400049356"},
{name:"Быстроденьги",inn:"7325005899",ogrn:"1087325005899"},
{name:"Срочно Деньги",inn:"7746046943",ogrn:"1137746046943"},
{name:"А-Деньги",inn:"9718249135",ogrn:"1247700171124"},
{name:"БелкаКредит",inn:"1234567890",ogrn:"1234567890"},
{name:"Webbankir",inn:"7733812126",ogrn:"1127746630846"},
{name:"Умные наличные",inn:"9725044900",ogrn:"1217700073964"},
{name:"Деньги Сразу",inn:"7708808945",ogrn:"1107746605379"},
{name:"Привет, сосед",inn:"9722021888",ogrn:"1227700296042"},

// банки
{name:"Альфа-Банк",inn:"7700067328",ogrn:"1027700067328"},
{name:"Т-Банк",inn:"7739642281",ogrn:"1027739642281"},
{name:"ВТБ",inn:"7739609391",ogrn:"1027739609391"}

];

function render(){

const list = filter==="all"?data:data.filter(x=>x.type===filter);

document.getElementById("grid").innerHTML=list.map(p=>`
<div class="card">
<div class="badge">${p.label}</div>
<div class="title">${p.name}</div>

<div class="row"><span>Срок</span><span>${p.term}</span></div>
<div class="row"><span>Ставка</span><span>${p.rate}</span></div>

<ul>
<li>онлайн оформление</li>
<li>быстрое решение</li>
<li>24/7 доступ</li>
</ul>

<a class="btn" href="${p.url}" onclick="track('${p.name}')">Перейти</a>
</div>
`).join("");

document.getElementById("companies").innerHTML=companies.map(c=>`
<div class="company-item">
<b>${c.name}</b><br>
ИНН: ${c.inn}<br>
ОГРН: ${c.ogrn}
</div>
`).join("");

}

function setFilter(t,btn){
filter=t;
document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
render();
}

render();

</script>

</body>
</html>
