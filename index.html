<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финансовый гид — займы и карты онлайн</title>

    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:Inter,system-ui,Arial;
            color:#fff;
            min-height:100vh;
            background: radial-gradient(circle at 20% 20%, #1a2a6c, transparent 40%),
                        radial-gradient(circle at 80% 0%, #b21f1f, transparent 40%),
                        radial-gradient(circle at 0% 80%, #fdbb2d, transparent 40%),
                        #0b1020;
        }

        .container{max-width:1280px;margin:0 auto;padding:20px}

        .header{
            text-align:center;
            padding:60px 25px;
            border-radius:30px;
            background:rgba(255,255,255,0.06);
            border:1px solid rgba(255,255,255,0.12);
            backdrop-filter:blur(14px);
        }

        h1{
            font-size:2.6rem;
            background:linear-gradient(90deg,#ffb347,#ffcc33,#ff5f6d);
            -webkit-background-clip:text;
            color:transparent;
        }

        .filters{display:flex;justify-content:center;gap:10px;margin:30px 0;flex-wrap:wrap}
        .filter-btn{padding:10px 18px;border-radius:999px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#fff;cursor:pointer}
        .filter-btn.active{background:linear-gradient(90deg,#ffb347,#ff5f6d);color:#111;font-weight:700}

        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}

        .card{background:rgba(17,24,39,0.75);border-radius:22px;padding:18px;border:1px solid rgba(255,255,255,0.08)}

        .badge{color:#ffcc33;font-size:12px}
        .title{font-size:1.3rem;font-weight:800;margin:6px 0}

        .row{display:flex;justify-content:space-between;font-size:13px;margin:6px 0;color:#cbd5e1}
        .value{color:#ffcc33;font-weight:700}

        ul{margin-top:10px;padding-left:16px;font-size:13px;color:#94a3b8}

        .btn{display:block;margin-top:14px;padding:12px;text-align:center;border-radius:14px;background:linear-gradient(90deg,#ffb347,#ff5f6d);color:#111;text-decoration:none;font-weight:800}

        /* TRUST */
        .trust{margin-top:40px;padding:20px;border-radius:20px;background:rgba(255,255,255,0.05)}
        .trust-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
        .trust-item{background:rgba(0,0,0,0.25);padding:10px;border-radius:12px;font-size:12px}

        /* COMPANY */
        .company{
            margin-top:40px;
            padding:20px;
            border-radius:20px;
            background:rgba(255,255,255,0.05);
        }

        .company-grid{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
            gap:12px;
            margin-top:10px;
        }

        .company-item{
            background:rgba(0,0,0,0.25);
            padding:12px;
            border-radius:12px;
            font-size:12px;
            color:#cbd5e1;
        }

    </style>
</head>
<body>

<div class="container">

<div class="header">
    <h1>💰 Финансовый гид</h1>
</div>

<div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">Все</button>
    <button class="filter-btn" onclick="setFilter('loan',this)">Займы</button>
    <button class="filter-btn" onclick="setFilter('debit',this)">Дебетовые</button>
    <button class="filter-btn" onclick="setFilter('credit',this)">Кредитные</button>
</div>

<div id="grid" class="grid"></div>

<div class="trust">
    <h3>🛡 Карточки доверия</h3>
    <div class="trust-grid" id="trust"></div>
</div>

<div class="company">
    <h3>📋 Информация о компаниях</h3>
    <div class="company-grid" id="company"></div>
</div>

</div>

<script>

{name:"Привет, сосед",type:"loan",label:"МФО",amount:"до 30 000 ₽",term:"30 дней",rate:"0–0.8%",age:"18+",features:["Паспорт","Круглосуточно"],url:"#"},

{name:"Альфа-Банк",type:"debit",label:"Дебетовая",amount:"—",term:"—",rate:"до 20%",age:"14+",features:["Кэшбэк","Курьер"],url:"#"},

{name:"Платёжный стикер ВТБ",type:"debit",label:"Стикер",amount:"—",term:"—",rate:"до 4.5%",age:"14+",features:["Телефон","Оплата"],url:"#"},

let filter='all';

function render(){
const list=filter==='all'?data:data.filter(x=>x.type===filter);

document.getElementById('grid').innerHTML=list.map(p=>`
<div class='card'>
<div class='badge'>${p.label}</div>
<div class='title'>${p.name}</div>
<div class='row'><span>Сумма</span><span class='value'>${p.amount}</span></div>
<div class='row'><span>Срок</span><span class='value'>${p.term}</span></div>
<div class='row'><span>Ставка</span><span class='value'>${p.rate}</span></div>
<div class='row'><span>Возраст</span><span class='value'>${p.age}</span></div>
<ul>${p.features.map(f=>`<li>${f}</li>`).join('')}</ul>
<a class='btn' href='${p.url}'>Подробнее</a>
</div>
`).join('');
}

function setFilter(t,btn){
filter=t;
document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
render();
}

function renderTrust(){
document.getElementById('trust').innerHTML=trust.map(t=>`<div class='trust-item'>${t}</div>`).join('');
}

function renderCompanies(){
    document.getElementById('company').innerHTML = companies.map(c => `
        <div class='company-item'>
            <strong>${c.name}</strong><br><br>
            ОГРН: ${c.ogrn}<br>
            ИНН: ${c.inn}<br>
            ${c.license}
        </div>
    `).join('');
}

render();
renderTrust();
renderCompanies();

</script>

</body>
</html>
